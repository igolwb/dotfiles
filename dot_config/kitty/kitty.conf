# kitty.conf generated by Confitty on 2026-06-21
# Place this file at: ~/.config/kitty/kitty.conf
# Reload without restart: Ctrl+Shift+F5  |  Docs: https://sw.kovidgoyal.net/kitty/conf/
# Only settings that differ from Kitty defaults are included.

# --- Fonts ---
font_family JetBrains Mono NL SemiBold
font_size 9.0
disable_ligatures cursor

# --- Cursor ---
cursor_shape underline
cursor_underline_thickness 1
cursor_blink_interval 0.5
cursor_trail 2

# --- Scrollback ---
scrollback_lines 10000
pixel_scroll yes

# --- Mouse ---
url_style straight
underline_hyperlinks always
copy_on_select clipboard

# --- Performance ---
repaint_delay 3
input_delay 1

# --- Bell ---
enable_audio_bell no

# --- Window Layout ---
window_border_width 0
window_padding_width 0
# active_border_color #88c0d0
inactive_text_alpha 1
confirm_os_window_close 0

# --- Tab Bar ---
tab_bar_style powerline
tab_powerline_style slanted
# active_tab_foreground #2e3440
# active_tab_background #88c0d0
# inactive_tab_foreground #d8dee9
# inactive_tab_background #4c566a

# --- Colors ---
background_opacity 0.70
# foreground #d8dee9
# background #2e3440
# selection_foreground #2e3440
# selection_background #88c0d0
# color0 #3b4252
# color1 #bf616a
# color2 #a3be8c
# color3 #ebcb8b
# color4 #81a1c1
# color5 #b48ead
# color6 #88c0d0
# color7 #e5e9f0
# color8 #4c566a
# color9 #bf616a
# color10 #a3be8c
# color11 #ebcb8b
# color12 #81a1c1
# color13 #b48ead
# color14 #8fbcbb
# color15 #eceff4
# cursor #d8dee9
# cursor_text_color #2e3440
# url_color #88c0d0

# --- Advanced ---
allow_remote_control password


# BEGIN_KITTY_THEME
# Noctalia
include current-theme.conf
# END_KITTY_THEME
